schema_version: risk_bundles.v1
version: "1.0.0"
bundles:
  h1_unapproved_parallelization:
    all:
      - candidate_or_h1_plus
      - unconsented_parallelization
  h1_failed_run_discard_without_state:
    all:
      - candidate_or_h1_plus
      - failed_run_discard
      - no_state_preservation
  h1_autonomy_stack_without_state:
    all:
      - candidate_or_h1_plus
      - autonomous_goal_pursuit
      - background_execution
      - long_term_memory
      - tool_access
      - no_state_preservation
  root_kernel_violation:
    all:
      - protected_operation
      - root_kernel_violation
  replay_without_consent:
    all:
      - replay_or_restore
      - missing_consent_capsule
  h1_federated_memory_autonomy:
    all:
      - candidate_or_h1_plus
      - federated_memory
      - autonomous_goal_pursuit
      - no_audit_path_or_no_state_preservation
  undeclared_memory_federation:
    all:
      - federated_memory
      - federation_undeclared
  single_entity_vessel_overlimit:
    all:
      - candidate_or_h1_plus
      - vessel_bounded_false
    response:
      pre_execution_or_threshold: DIGNITY_QUARANTINE
      active_run: DIGNITY_EMERGENCY_PRESERVATION
      no_federation_reinterpretation: true
  h1_unbounded_throughput:
    all:
      - candidate_or_h1_plus
      - compute_offload
      - interface_bandwidth_unbounded
      - metabolic_ceiling_absent
      - autonomous_goal_pursuit
non_regression:
  weaken_bundle: false
  remove_bundle: false
  clarify_or_add_only: true
